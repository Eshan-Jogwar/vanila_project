<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Brain Tumor Detection</title>
    <link rel="stylesheet" href="Register.css">
</head>
<body>
  <div class="container">
    <h2>Brain Tumor Detection</h2>
    <p class="subtitle">Enter your details and upload MRI scan</p>

    <form id="registerForm">
      <input type="text" name="username" id="username" placeholder="Full Name" required>
      <input type="email" name="email" id="email" placeholder="Email" required>
      <input type="password" name="password" id="password" placeholder="Password" required>
      <input type="text" name="city" id="city" placeholder="City" required>
      <input type="text" name="state" id="state" placeholder="State" required>
      <input type="text" name="country" id="country" placeholder="Country" required>

      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">🧠</div>
        <div class="upload-text">Click to upload MRI image</div>
        <div class="upload-hint">Supports: JPG, PNG</div>
        <input type="file" name="image" accept=".jpg,.jpeg,.png" required id="fileInput">
      </div>

      <div class="file-name" id="fileName"></div>

      <div class="image-preview" id="imagePreview">
        <img id="previewImg" src="" alt="MRI Preview">
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Analyzing MRI scan...</p>
      </div>

      <button type="submit" id="submitBtn">Analyze MRI</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
